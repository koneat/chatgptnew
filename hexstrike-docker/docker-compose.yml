name: hexstrike-docker

services:
  hexstrike:
    build:
      context: .
      args:
        HEXSTRIKE_REPO: ${HEXSTRIKE_REPO:-https://github.com/0x4m4/hexstrike-ai.git}
        HEXSTRIKE_REF: ${HEXSTRIKE_REF:-master}
        INSTALL_GO_TOOLS: ${INSTALL_GO_TOOLS:-true}
        INSTALL_PY_TOOLS: ${INSTALL_PY_TOOLS:-true}
    image: hexstrike-ai:docker
    container_name: hexstrike-ai
    env_file:
      - .env
    environment:
      HEXSTRIKE_HOST: ${HEXSTRIKE_HOST:-0.0.0.0}
      HEXSTRIKE_PORT: ${HEXSTRIKE_PORT:-8888}
      CHROME_BIN: ${CHROME_BIN:-/usr/bin/chromium}
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}
      DISPLAY: ${DISPLAY:-:99}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${HEXSTRIKE_BIND:-127.0.0.1}:${HEXSTRIKE_PORT:-8888}:8888"
    volumes:
      - ./workspace:/workspace
      - ./reports:/reports
      - ./data:/data
      - ./config:/root/.config/hexstrike
    cap_add:
      - NET_RAW
      - NET_ADMIN
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/hexstrike-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
